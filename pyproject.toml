[project]
name = "crash-mcp"
version = "0.1.0"
description = "MCP server for crash dump analysis"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"

dependencies = [
    "mcp",
    "python-dotenv",
    "pexpect",
    "drgn",
    "click",
]



[project.scripts]
crash-mcp = "crash_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
