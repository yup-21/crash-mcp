id: softlockup_analysis
name: Soft Lockup 分析
triggers:
  - pattern: "soft lockup"
  - pattern: "softlockup"
  - pattern: "BUG: soft lockup"
  - pattern: "watchdog"
description: 分析 CPU 软死锁问题

steps:
  - order: 1
    command: "crash:bt -a"
    purpose: 查看所有 CPU 堆栈
    
  - order: 2
    command: "crash:runq"
    purpose: 查看运行队列
    
  - order: 3
    command: "crash:foreach bt"
    purpose: 查看所有任务堆栈

outputs:
  - name: locked_cpu
  - name: running_task
  - name: lock_time

next_methods:
  - condition: "spinlock"
    method_id: spinlock_analysis
  - condition: "interrupt"
    method_id: irq_analysis

tags: [softlockup, cpu, watchdog]
